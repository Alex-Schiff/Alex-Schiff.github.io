<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0d0f18"/>
    </radialGradient>
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="18%" stop-color="#e0d0ff" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#a78bfa" stop-opacity="0.75"/>
      <stop offset="70%" stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b0764" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring-metal" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="30%" stop-color="#7c3aed"/>
      <stop offset="55%" stop-color="#2d1b69"/>
      <stop offset="75%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="outer-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#4c1d95" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d0f18" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ray-blur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Outer ambient cosmic glow -->
  <circle cx="32" cy="32" r="28" fill="url(#outer-glow)"/>

  <!-- Light rays (like the card art) -->
  <rect x="0" y="30.5" width="64" height="3" rx="1.5" fill="#c4b5fd" opacity="0.12" filter="url(#ray-blur)"/>
  <line x1="4" y1="8" x2="60" y2="56" stroke="#a78bfa" stroke-width="2" opacity="0.08" filter="url(#ray-blur)"/>
  <line x1="60" y1="8" x2="4" y2="56" stroke="#a78bfa" stroke-width="2" opacity="0.08" filter="url(#ray-blur)"/>

  <!-- Nebula glow behind the ring -->
  <circle cx="32" cy="32" r="18" fill="url(#nebula)" filter="url(#glow-strong)"/>

  <!-- Ring body -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="url(#ring-metal)" stroke-width="11" filter="url(#glow-soft)"/>

  <!-- Ring inner edge highlight -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#e0d0ff" stroke-width="1.2" stroke-dasharray="28 100" stroke-dashoffset="-8" opacity="0.6"/>

  <!-- Ring outer edge highlight -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#ffffff" stroke-width="0.8" stroke-dasharray="20 110" stroke-dashoffset="15" opacity="0.35"/>

  <!-- Nebula core bright spot -->
  <circle cx="32" cy="32" r="7" fill="#ffffff" opacity="0.9" filter="url(#glow-strong)"/>
  <circle cx="32" cy="32" r="4" fill="#ffffff" opacity="1"/>

  <!-- Star specks -->
  <circle cx="12" cy="14" r="0.7" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="52" cy="10" r="0.5" fill="#e0d0ff" opacity="0.6"/>
  <circle cx="8"  cy="48" r="0.6" fill="#a78bfa" opacity="0.5"/>
  <circle cx="56" cy="50" r="0.7" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="20" cy="55" r="0.4" fill="#e0d0ff" opacity="0.4"/>
  <circle cx="48" cy="54" r="0.5" fill="#a78bfa" opacity="0.5"/>
</svg>
